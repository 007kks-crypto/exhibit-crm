
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ExhibitCRM</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, setDoc, getDoc, getDocs, onSnapshot, query, where, serverTimestamp, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANPn-V_KmdLtyBJ25eiwLw8zKh4Y_7h1w",
    authDomain: "exhibition-test-e04bd.firebaseapp.com",
    projectId: "exhibition-test-e04bd",
    storageBucket: "exhibition-test-e04bd.firebasestorage.app",
    messagingSenderId: "633920247304",
    appId: "1:633920247304:web:58c1b98816ebf76318a3bd"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const SUPER_ADMIN = 'gskim@jeiotech.com'; // 최고 관리자 (항상 관리자)
  let adminEmails = new Set([SUPER_ADMIN]); // 관리자 이메일 목록 (동적)
  const REGIONS = ['서울','부산','인천','대구','대전','광주','울산','세종','경기','강원','충북','충남','전북','전남','경북','경남','제주'];
  const COLORS  = [
    {bg:'#E1F5EE',txt:'#0F6E56'},{bg:'#E6F1FB',txt:'#185FA5'},
    {bg:'#FAEEDA',txt:'#854F0B'},{bg:'#FBEAF0',txt:'#993556'},
    {bg:'#EEEDFE',txt:'#3C3489'},{bg:'#EAF3DE',txt:'#3B6D11'},
  ];

  let currentUser    = null;
  let activeProject  = null;
  let projects       = [];
  let customers      = [];
  let priceLists     = {};   // pid -> [{id,name,price,released,note}]
  let notices        = [];
  let selectedCust   = null;
  let unsubCustomers = null;
  let unsubProjects  = null;
  let unsubAllCustomers = null;
  let allCustomers   = []; // 전체 고객 (전시회 무관)
  let unsubNotices   = null;
  let sidebarOpen    = false;
  let cameraStream   = null;
  let cardImageData  = null;
  let qrScanMode     = false;  // QR 스캔 모드
  let qrScanLoop     = null;   // QR 스캔 루프 ID
  let qrScanned      = false;  // 중복 스캔 방지

  const col     = s => { let h=0; for(let c of s) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; };
  const ini     = n => n ? n.slice(0,2) : '?';
  const today   = () => new Date().toISOString().split('T')[0];
  const $       = id => document.getElementById(id);
  const isAdmin = () => currentUser && adminEmails.has(currentUser.email);
  const isMobile= () => window.innerWidth <= 768;
  const toast   = msg => { const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); };
  const fmtDT   = ts => {
    if (!ts) return '—';
    try {
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}) + ' ' +
             d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    } catch(e) { return '—'; }
  };
  const purposeColor = p => {
    const map = {
      '일반적 정보탐색': {bg:'#E6F1FB', txt:'#185FA5'},
      '구체적인 정보수집': {bg:'#FAEEDA', txt:'#854F0B'},
      '구매 일정 확립':   {bg:'#E1F5EE', txt:'#0F6E56'},
      '기타':             {bg:'#F4F3EF', txt:'#999'},
    };
    return map[p] || {bg:'#F4F3EF', txt:'#999'};
  };
  const purposeBadge = p => {
    if (!p) return '';
    const c = purposeColor(p);
    return `<span style="font-size:10px;padding:2px 7px;border-radius:8px;background:${c.bg};color:${c.txt};font-weight:600;white-space:nowrap;">${p}</span>`;
  };

  const fmtPrice = v => {
    if (!v && v!==0) return '—';
    return Number(v).toLocaleString('ko-KR') + '원';
  };

  // ── Auth ──────────────────────────────────
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      $('authScreen').style.display = 'none';
      $('appScreen').style.display  = 'flex';
      $('userDisplayName').textContent = user.displayName || user.email;
      $('userAvatar').textContent = ini(user.displayName || user.email);
      $('adminBadge').style.display  = isAdmin() ? 'inline-block' : 'none';
      $('nav2').style.display        = isAdmin() ? 'flex' : 'none';
      $('nav5').style.display        = isAdmin() ? 'flex' : 'none';
      startApp(true); // true = 로그인 직후
    } else {
      $('authScreen').style.display = 'flex';
      $('appScreen').style.display  = 'none';
      cleanup();
    }
  });

  function cleanup() {
    if (unsubProjects)     { unsubProjects();     unsubProjects     = null; }
    if (unsubCustomers)    { unsubCustomers();    unsubCustomers    = null; }
    if (unsubAllCustomers) { unsubAllCustomers(); unsubAllCustomers = null; }
    if (unsubNotices)      { unsubNotices();      unsubNotices      = null; }
    projects=[]; customers=[]; notices=[]; priceLists={}; activeProject=null; selectedCust=null;
  }

  window.doLogin = async () => {
    const email=$('authEmail').value.trim(), pw=$('authPw').value.trim();
    if (!email||!pw) { toast('이메일과 비밀번호를 입력하세요.'); return; }
    try { await signInWithEmailAndPassword(auth,email,pw); }
    catch(e) { toast('로그인 실패: '+(e.code==='auth/invalid-credential'?'이메일 또는 비밀번호를 확인하세요.':e.message)); }
  };
  window.doRegister = async () => {
    const name=$('regName').value.trim(), email=$('regEmail').value.trim(), pw=$('regPw').value.trim();
    if (!name||!email||!pw) { toast('모든 항목을 입력하세요.'); return; }
    if (pw.length<6) { toast('비밀번호는 6자 이상이어야 합니다.'); return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth,email,pw);
      await updateProfile(cred.user,{displayName:name});
      // uid를 문서 ID로 저장 (중복 방지)
      try {
        await setDoc(doc(db,'users',cred.user.uid),{
          uid:cred.user.uid, name, email,
          joinedAt:serverTimestamp(), lastLogin:serverTimestamp()
        });
      } catch(e) {}
      toast(`${name}님, 환영합니다!`);
    } catch(e) { toast('가입 실패: '+(e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일입니다.':e.message)); }
  };
  // ── Excel Export ──────────────────────────
  window.exportExcel = async () => {
    if (!activeProject) { toast('전시회를 먼저 선택하세요.'); return; }
    const p = projects.find(x=>x.id===activeProject);
    const btn = $('exportBtn');
    if (btn) { btn.disabled=true; btn.textContent='생성 중...'; }

    try {
      // 관리자는 전체, 일반사원은 본인 것만
      const q = query(collection(db,'customers'), where('projectId','==',activeProject));
      const snap = await new Promise(res => { const u = onSnapshot(q, s=>{u();res(s);}); });
      let all = snap.docs.map(d=>({id:d.id,...d.data()}));
      if (!isAdmin()) all = all.filter(c=>c.createdBy===currentUser.uid);
      all.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));

      if (!all.length) { toast('내보낼 고객 데이터가 없습니다.'); return; }

      const dr = p.dateFrom?(p.dateTo&&p.dateTo!==p.dateFrom?`${p.dateFrom}~${p.dateTo}`:p.dateFrom):(p.date||'');

      // 헤더
      const headers = ['번호','고객명','소속','지역','방문목적','상담일','등록일시','담당자','QR스캔내용','명함여부','메모수','상담내용'];

      // 데이터 행
      const rows = all.map((c, i) => {
        const dt = c.createdAt?.toDate ? c.createdAt.toDate() : null;
        const dtStr = dt ? dt.toLocaleDateString('ko-KR') + ' ' + dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '—';
        const memos = (c.memos||[]).map(m=>m.text||'').join(' / ');
        return [
          i+1,
          c.name||'',
          c.org||'',
          c.region||'',
          c.purpose||'',
          c.date||'',
          dtStr,
          c.authorName||'',
          c.qrData||'',
          c.cardImage?'등록':'미등록',
          (c.memos||[]).length,
          memos
        ];
      });

      // 워크북 생성
      const wb = XLSX.utils.book_new();
      const wsData = [
        [`전시회: ${p.name}`, '', '', '', '', '', '', '', '', ''],
        [`기간: ${dr}`, '', '', '', '', '', '', '', '', ''],
        [`추출일시: ${new Date().toLocaleDateString('ko-KR')} ${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`, '', '', '', '', '', '', '', '', ''],
        [`총 고객수: ${all.length}명`, '', '', '', '', '', '', '', '', ''],
        [],
        headers,
        ...rows
      ];
      const ws = XLSX.utils.aoa_to_sheet(wsData);

      // 열 너비 설정
      ws['!cols'] = [
        {wch:5},{wch:12},{wch:18},{wch:8},{wch:14},{wch:12},
        {wch:18},{wch:14},{wch:30},{wch:8},{wch:6},{wch:50}
      ];

      // 병합 (제목 행)
      ws['!merges'] = [
        {s:{r:0,c:0},e:{r:0,c:9}},
        {s:{r:1,c:0},e:{r:1,c:9}},
        {s:{r:2,c:0},e:{r:2,c:9}},
        {s:{r:3,c:0},e:{r:3,c:9}},
      ];

      XLSX.utils.book_append_sheet(wb, ws, p.name.slice(0,30));

      // 다운로드
      const dateStr = new Date().toISOString().split('T')[0];
      const fileName = p.name.replace(/[/\\:*?"<>|]/g,'_') + '_고객목록_' + dateStr + '.xlsx';
      XLSX.writeFile(wb, fileName);
      toast(`📥 ${all.length}명 데이터가 다운로드되었습니다.`);
    } catch(e) {
      toast('내보내기 실패: '+e.message); console.error(e);
    } finally {
      if (btn) { btn.disabled=false; btn.textContent='📥 엑셀 다운로드'; }
    }
  };

  // ── 마이페이지 ───────────────────────────
  window.openMyPage = () => {
    openModal(`
      <div class="modal-title">👤 내 정보</div>
      <div class="modal-sub">계정 정보를 확인하고 수정할 수 있습니다.</div>

      <div style="background:#F4F3EF;border-radius:12px;padding:16px;margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:48px;height:48px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;">${ini(currentUser.displayName||currentUser.email)}</div>
          <div>
            <div style="font-weight:600;font-size:15px;">${currentUser.displayName||'—'}</div>
            <div style="font-size:13px;color:#555;margin-top:2px;">${currentUser.email}</div>
            ${isAdmin()?'<div style="font-size:10px;font-weight:600;color:#0F6E56;background:#E1F5EE;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px;">관리자</div>':''}
          </div>
        </div>
      </div>

      <div style="border:1px solid rgba(0,0,0,0.08);border-radius:12px;overflow:hidden;margin-bottom:20px;">
        <div style="padding:14px 16px;border-bottom:1px solid rgba(0,0,0,0.06);">
          <div style="font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">이름 변경</div>
          <div style="display:flex;gap:8px;">
            <input type="text" id="mp_name" value="${currentUser.displayName||''}" placeholder="이름 입력" style="flex:1;">
            <button class="btn btn-primary" style="font-size:12px;padding:6px 12px;white-space:nowrap;" onclick="updateName()">변경</button>
          </div>
        </div>
        <div style="padding:14px 16px;">
          <div style="font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">비밀번호 변경</div>
          <div class="form-row" style="margin-bottom:10px;">
            <label class="form-label">현재 비밀번호</label>
            <input type="text" id="mp_cur_pw" placeholder="현재 비밀번호" style="-webkit-text-security:disc;">
          </div>
          <div class="form-row" style="margin-bottom:10px;">
            <label class="form-label">새 비밀번호</label>
            <input type="text" id="mp_new_pw" placeholder="새 비밀번호 (6자 이상)" style="-webkit-text-security:disc;">
          </div>
          <div class="form-row" style="margin-bottom:14px;">
            <label class="form-label">새 비밀번호 확인</label>
            <input type="text" id="mp_new_pw2" placeholder="새 비밀번호 재입력" style="-webkit-text-security:disc;">
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;" onclick="changePassword()">비밀번호 변경</button>
        </div>
      </div>

      <div style="border:1px solid #FCEBEB;border-radius:12px;padding:14px 16px;">
        <div style="font-size:12px;font-weight:600;color:#E24B4A;margin-bottom:8px;">위험 구역</div>
        <button class="btn btn-danger" style="width:100%;justify-content:center;padding:10px;" onclick="confirmLogout()">🚪 로그아웃</button>
      </div>

      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">닫기</button>
      </div>`);
  };

  window.updateName = async () => {
    const name = $('mp_name').value.trim();
    if (!name) { toast('이름을 입력하세요.'); return; }
    try {
      await updateProfile(currentUser, { displayName: name });
      // Firestore users 컬렉션도 업데이트
      await updateDoc(doc(db,'users',currentUser.uid), { name });
      $('userDisplayName').textContent = name;
      $('userAvatar').textContent = ini(name);
      toast('이름이 변경되었습니다.');
    } catch(e) { toast('변경 실패: '+e.message); }
  };

  window.changePassword = async () => {
    const curPw  = $('mp_cur_pw').value.trim();
    const newPw  = $('mp_new_pw').value.trim();
    const newPw2 = $('mp_new_pw2').value.trim();
    if (!curPw)  { toast('현재 비밀번호를 입력하세요.'); return; }
    if (!newPw)  { toast('새 비밀번호를 입력하세요.'); return; }
    if (newPw.length < 6) { toast('새 비밀번호는 6자 이상이어야 합니다.'); return; }
    if (newPw !== newPw2) { toast('새 비밀번호가 일치하지 않습니다.'); return; }
    try {
      // 재인증 후 비밀번호 변경
      const credential = EmailAuthProvider.credential(currentUser.email, curPw);
      await reauthenticateWithCredential(currentUser, credential);
      await updatePassword(currentUser, newPw);
      closeModal();
      toast('비밀번호가 변경되었습니다.');
    } catch(e) {
      if (e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') toast('현재 비밀번호가 올바르지 않습니다.');
      else toast('변경 실패: '+e.message);
    }
  };

  window.confirmLogout = () => {
    if (confirm('로그아웃 하시겠습니까?')) { closeModal(); doLogout(); }
  };

  window.doLogout    = () => signOut(auth);
  window.showLogin   = () => { $('loginBox').style.display='block';  $('registerBox').style.display='none'; };
  window.showRegister= () => { $('loginBox').style.display='none';   $('registerBox').style.display='block'; };

  // ── Sidebar ───────────────────────────────
  window.toggleSidebar = () => {
    sidebarOpen=!sidebarOpen;
    $('sidebar').classList.toggle('open',sidebarOpen);
    $('sidebarOverlay').style.display=sidebarOpen?'block':'none';
  };
  window.closeSidebar = () => {
    sidebarOpen=false; $('sidebar').classList.remove('open'); $('sidebarOverlay').style.display='none';
  };

  // ── Camera ────────────────────────────────
  window.openCamera = async (mode='photo') => {
    qrScanMode = (mode === 'qr');
    qrScanned  = false;
    $('cameraWrap').style.display='flex';
    // UI 전환
    $('camShootBtn').style.display  = qrScanMode ? 'none'  : 'flex';
    $('camQrGuide').style.display   = qrScanMode ? 'flex'  : 'none';
    $('camPhotoGuide').style.display= qrScanMode ? 'none'  : 'flex';
    $('camQrResult').style.display  = 'none';
    $('camQrResult').textContent    = '';
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      $('cameraVideo').srcObject = cameraStream;
      await $('cameraVideo').play();
      if (qrScanMode) startQrScan();
    } catch(e) { $('cameraWrap').style.display='none'; toast('카메라를 사용할 수 없습니다. 갤러리에서 선택해주세요.'); }
  };

  // QR 실시간 스캔
  function startQrScan() {
    const canvas  = $('cameraCanvas');
    const video   = $('cameraVideo');
    const ctx     = canvas.getContext('2d');
    function scan() {
      if (!qrScanMode || qrScanned) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {inversionAttempts:'dontInvert'});
        if (code && code.data) {
          qrScanned = true;
          onQrDetected(code.data);
          return;
        }
      }
      qrScanLoop = requestAnimationFrame(scan);
    }
    qrScanLoop = requestAnimationFrame(scan);
  }

  function onQrDetected(text) {
    // 스캔 성공 — 결과 표시
    const resultEl = $('camQrResult');
    resultEl.style.display = 'block';
    resultEl.textContent   = '✅ 스캔 완료: ' + text.slice(0, 80) + (text.length>80?'...':'');
    // 진동 (모바일)
    if (navigator.vibrate) navigator.vibrate(200);
    toast('QR 스캔 완료!');
    // 2초 후 카메라 닫고 메모에 저장
    setTimeout(() => {
      closeCamera();
      applyQrResult(text);
    }, 1500);
  }

  function applyQrResult(text) {
    // 고객 등록 모달의 QR 전용 메모창
    const qrMemo = $('fc_qr_memo');
    if (qrMemo) {
      qrMemo.value = text;
      qrMemo.style.borderColor = '#1D9E75';
      toast('QR 내용이 스캔 내용란에 저장되었습니다.');
      return;
    }
    // 상세 패널 메모 입력란
    const newMemo = $('newMemoText');
    if (newMemo) {
      newMemo.value = newMemo.value ? newMemo.value + '\n[QR] ' + text : '[QR] ' + text;
      toast('QR 내용이 메모 입력란에 추가되었습니다.');
      return;
    }
    navigator.clipboard.writeText(text).then(()=>toast('QR 내용이 클립보드에 복사되었습니다.')).catch(()=>toast('QR 결과: '+text));
  }
  window.capturePhoto = () => {
    const v=$('cameraVideo'), canvas=$('cameraCanvas');
    canvas.width=v.videoWidth||640; canvas.height=v.videoHeight||480;
    canvas.getContext('2d').drawImage(v,0,0);
    const maxW=800, scale=Math.min(1,maxW/canvas.width);
    const c2=document.createElement('canvas');
    c2.width=Math.round(canvas.width*scale); c2.height=Math.round(canvas.height*scale);
    c2.getContext('2d').drawImage(canvas,0,0,c2.width,c2.height);
    cardImageData=c2.toDataURL('image/jpeg',0.75);
    closeCamera(); updateCardPreview(); toast('명함 촬영 완료!');
  };
  window.closeCamera = () => {
    qrScanMode = false;
    if (qrScanLoop) { cancelAnimationFrame(qrScanLoop); qrScanLoop=null; }
    if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }

  window.onGallerySelected = input => {
    const file=input.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=800, scale=Math.min(1,maxW/img.width);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        cardImageData=c.toDataURL('image/jpeg',0.75);
        updateCardPreview(); toast('명함 사진 선택 완료!');
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file); input.value='';
  };

  function startApp(firstLogin=false) {
    // admins 컬렉션 실시간 구독
    onSnapshot(collection(db,'admins'), snap => {
      adminEmails = new Set([SUPER_ADMIN]);
      snap.docs.forEach(d => { if(d.data().email) adminEmails.add(d.data().email); });
      // 관리자 배지 및 메뉴 업데이트
      if (currentUser) {
        $('adminBadge').style.display  = isAdmin() ? 'inline-block' : 'none';
        $('nav2').style.display        = isAdmin() ? 'flex' : 'none';
        $('nav5').style.display        = isAdmin() ? 'flex' : 'none';
      }
    });

    // uid를 문서 ID로 사용 → 중복 없이 저장
    const userRef = doc(db, 'users', currentUser.uid);
    getDoc(userRef).then(snap => {
      if (snap.exists()) {
        // 이미 있으면 lastLogin만 업데이트
        updateDoc(userRef, { lastLogin: serverTimestamp() });
      } else {
        // 처음 로그인이면 신규 저장
        setDoc(userRef, {
          uid:      currentUser.uid,
          name:     currentUser.displayName||'',
          email:    currentUser.email||'',
          joinedAt: serverTimestamp(),
          lastLogin:serverTimestamp()
        });
      }
    });

    // 전체 고객 실시간 구독 (고객 목록 메뉴용)
    unsubAllCustomers = onSnapshot(collection(db,'customers'), snap => {
      let all = snap.docs.map(d=>({id:d.id,...d.data()}));
      // 관리자: 전체 / 일반: 본인 것만 — 모든 페이지 공통 적용
      if (!isAdmin()) all = all.filter(c => c.createdBy === currentUser.uid);
      all.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      allCustomers = all;
      // 사이드바 전시회별 카운트 항상 갱신
      renderProjectList();
      // viewCustomers가 보이는 상태면 항상 다시 렌더
      if ($('viewCustomers') && $('viewCustomers').style.display !== 'none') {
        if (activeProject) {
          customers = allCustomers.filter(c => c.projectId === activeProject);
          renderStats(); renderTable();
        } else {
          renderAllCustomers();
        }
      }
    });

    let isFirstLoad = true;
    unsubProjects = onSnapshot(collection(db,'projects'), snap => {
      projects = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      renderProjectList();
      // 첫 로드 시 대시보드로
      if (isFirstLoad) {
        isFirstLoad = false;
        if (firstLogin) {
          setView('dashboard');
        } else if (!activeProject && projects.length) {
          selectProject(projects[0].id);
        }
      }
    });
    // notices 실시간 구독
    unsubNotices = onSnapshot(query(collection(db,'notices'), orderBy('createdAt','desc')), snap => {
      notices = snap.docs.map(d=>({id:d.id,...d.data()}));
      if ($('viewNotices').style.display!=='none') renderNoticesPage();

      if (filterProjectId && c.projectId !== filterProjectId) return false;
      if (filterAuthor    && c.authorName !== filterAuthor)   return false;
      if (q && !c.name.toLowerCase().includes(q) &&
               !c.org.toLowerCase().includes(q)  &&
               !(c.region||'').includes(q)        &&
               !(c.authorName||'').toLowerCase().includes(q)) return false;
      return true;

  window.cleanupDuplicateUsers = async () => {
    if (!isAdmin()) return;
    const btn = $('cleanupBtn');
    if (btn) { btn.disabled=true; btn.textContent='정리 중...'; }
    try {
      const snap = await getDocs(collection(db,'users'));
      const all  = snap.docs.map(d=>({docId:d.id, ...d.data()}));

      // uid 기준으로 그룹화
      const byUid = {};
      all.forEach(u => {
        const key = u.uid || u.docId;
        if (!byUid[key]) byUid[key] = [];
        byUid[key].push(u);
      });

      // email 기준으로도 그룹화 (uid 없는 경우 대비)
      const byEmail = {};
      all.forEach(u => {
        if (!u.email) return;
        if (!byEmail[u.email]) byEmail[u.email] = [];
        byEmail[u.email].push(u);
      });

      let deleteCount = 0;

      // uid 기준 중복 제거: 가장 오래된 것(joinedAt 빠른 것) 남기고 나머지 삭제
      for (const uid of Object.keys(byUid)) {
        const docs = byUid[uid];
        if (docs.length <= 1) continue;
        // joinedAt 기준 정렬 - 가장 오래된 것 유지
        docs.sort((a,b) => (a.joinedAt?.seconds||0) - (b.joinedAt?.seconds||0));
        // uid를 docId로 쓰는 문서가 있으면 그걸 우선 유지
        const keepIdx = docs.findIndex(d => d.docId === uid);
        const keepDoc = keepIdx>=0 ? docs[keepIdx] : docs[0];
        for (const d of docs) {
          if (d.docId === keepDoc.docId) continue;
          await deleteDoc(doc(db,'users',d.docId));
          deleteCount++;
        }
        // 남긴 문서가 uid를 docId로 쓰지 않는다면 uid docId로 새로 저장 후 기존 삭제
        if (keepDoc.docId !== uid) {
          await setDoc(doc(db,'users',uid), {
            uid: uid,
            name: keepDoc.name||'',
            email: keepDoc.email||'',
            joinedAt: keepDoc.joinedAt||serverTimestamp(),
            lastLogin: keepDoc.lastLogin||serverTimestamp()
          });
          await deleteDoc(doc(db,'users',keepDoc.docId));
        }
      }

      // email 기준 추가 중복 제거 (uid 다른데 email 같은 경우)
      for (const email of Object.keys(byEmail)) {
        const snap2 = await getDocs(query(collection(db,'users'), where('email','==',email)));
        const docs2 = snap2.docs.map(d=>({docId:d.id,...d.data()}));
        if (docs2.length <= 1) continue;
        docs2.sort((a,b)=>(a.joinedAt?.seconds||0)-(b.joinedAt?.seconds||0));
        for (let i=1; i<docs2.length; i++) {
          await deleteDoc(doc(db,'users',docs2[i].docId));
          deleteCount++;
        }
      }

      toast(`✅ 중복 ${deleteCount}건이 정리되었습니다.`);
      renderMembersPage();
    } catch(e) {
      toast('정리 실패: '+e.message);
      console.error(e);
    } finally {
      if (btn) { btn.disabled=false; btn.textContent='🧹 중복 정리'; }
    }
  };

        <button class="btn btn-primary" id="saveNewBtn" onclick="saveNewCustomer()">저장</button>
      </div>`);
  };
  window.openEditCustomer = cid => {
    const c=customers.find(x=>x.id===cid); if(!c) return;
    cardImageData=c.cardImage||null;
    openModal(`
      <div class="modal-title">고객 정보 편집</div>
      <div class="modal-sub">${c.name} · ${c.org}</div>
      <div class="form-row-2">
        <div><label class="form-label">고객명 <span class="req">*</span></label><input type="text" id="ec_name" value="${c.name}" autocomplete="off"></div>
        <div><label class="form-label">소속 <span class="req">*</span></label><input type="text" id="ec_org" value="${c.org}" autocomplete="off"></div>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">지역</label><select id="ec_region">${REGIONS.map(r=>`<option${r===c.region?' selected':''}>${r}</option>`).join('')}</select></div>
        <div><label class="form-label">상담일</label><input type="date" id="ec_date" value="${c.date||today()}"></div>
      </div>
      <div class="form-row"><label class="form-label">방문 목적 <span class="req">*</span></label>
        <select id="ec_purpose">
          <option value="">방문 목적 선택</option>
          <option value="일반적 정보탐색"${c.purpose==='일반적 정보탐색'?' selected':''}>일반적 정보탐색</option>
          <option value="구체적인 정보수집"${c.purpose==='구체적인 정보수집'?' selected':''}>구체적인 정보수집</option>
          <option value="구매 일정 확립"${c.purpose==='구매 일정 확립'?' selected':''}>구매 일정 확립</option>
          <option value="기타"${c.purpose==='기타'?' selected':''}>기타</option>
        </select>
      </div>
      <div class="form-row"><label class="form-label">명함 사진</label>
        <div id="cardPreview">${c.cardImage?`<div style="position:relative;display:inline-block;width:100%;"><img src="${c.cardImage}" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;display:block;"><button onclick="removeCardImage()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;">✕</button></div>`:cardEmptyHtml()}</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteCustomer('${c.id}')">삭제</button>
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" id="saveEditBtn" onclick="saveEditCustomer('${c.id}')">저장</button>
      </div>`);
  };
  window.openAddProject = () => openModal(`
    <div class="modal-title">전시회 등록</div>
    <div class="modal-sub">새로운 전시회 프로젝트를 등록하세요.</div>
    <div class="form-row"><label class="form-label">전시회명 <span class="req">*</span></label><input type="text" id="fp_name" placeholder="2025 스마트팩토리 엑스포" autocomplete="off"></div>
    <div class="form-row"><label class="form-label">개최 장소</label><input type="text" id="fp_loc" placeholder="서울 COEX A홀" autocomplete="off"></div>
    <div class="form-row-2">
      <div><label class="form-label">시작일</label><input type="date" id="fp_date_from" value="${today()}"></div>
      <div><label class="form-label">종료일</label><input type="date" id="fp_date_to" value="${today()}"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveProject()">등록</button>
    </div>`);

  window.addEventListener('resize', renderTable);
  document.addEventListener('keydown', e => {
    if (e.key==='Enter'&&e.target.id==='authEmail') $('authPw').focus();
    if (e.key==='Enter'&&e.target.id==='authPw') doLogin();
  });
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-d:#0F6E56;--green-l:#E1F5EE;--green-m:#9FE1CB;
  --danger:#E24B4A;--danger-l:#FCEBEB;
  --bg:#F4F3EF;--surface:#FFFFFF;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --c-text:#1A1A1A;--c-text2:#555;--c-muted:#999;
  --radius:10px;--radius-lg:14px;
  font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
}
body{background:var(--bg);color:var(--c-text);min-height:100vh;}

#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a3d2b 0%,#1D9E75 100%);padding:16px;}
.auth-card{background:var(--surface);border-radius:18px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.18);}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.auth-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--green);}
.auth-logo-text{font-size:18px;font-weight:600;letter-spacing:-0.5px;}
.auth-title{font-size:20px;font-weight:600;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--c-muted);margin-bottom:20px;}
.auth-switch{font-size:13px;color:var(--c-muted);margin-top:16px;text-align:center;}
.auth-switch a{color:var(--green);cursor:pointer;text-decoration:underline;}

#appScreen{display:flex;height:100vh;height:100dvh;overflow:hidden;}
#sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform 0.25s ease;z-index:100;}
.sidebar-top{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--green);}
.sidebar-close{display:none;cursor:pointer;font-size:20px;color:var(--c-muted);padding:0 4px;}
.sidebar-section{padding:12px 10px 4px;}
.sidebar-label{font-size:10px;font-weight:600;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.8px;padding:0 6px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--c-text2);transition:background 0.15s;}
.nav-item:hover{background:var(--bg);}
.nav-item.active{background:var(--green-l);color:var(--green-d);font-weight:600;}
.project-list{padding:8px 10px;flex:1;overflow-y:auto;}
.project-chip{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--c-text2);transition:background 0.15s;margin-bottom:2px;}
.project-chip:hover{background:var(--bg);}
.project-chip.active{background:var(--green-l);color:var(--green-d);font-weight:600;}
.project-chip-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.project-count{font-size:10px;padding:1px 6px;background:var(--bg);border-radius:8px;color:var(--c-muted);margin-left:4px;flex-shrink:0;}
.project-chip.active .project-count{background:var(--green-m);color:var(--green-d);}
.sidebar-bottom{padding:10px;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);}
.s-avatar{width:30px;height:30px;border-radius:50%;background:var(--green-l);color:var(--green-d);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.logout-btn{font-size:11px;color:var(--c-muted);cursor:pointer;padding:2px 4px;border-radius:4px;display:inline-block;margin-top:2px;}
.logout-btn:hover{color:var(--danger);background:var(--danger-l);}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.menu-btn{display:none;cursor:pointer;padding:6px;border-radius:var(--radius);background:none;border:none;color:var(--c-text);}
.topbar-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-meta{font-size:11px;color:var(--c-muted);}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.search-bar{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;}
.search-bar input{border:none;background:transparent;outline:none;font-size:13px;color:var(--c-text);font-family:inherit;width:150px;}
.content{flex:1;overflow-y:auto;padding:16px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;}
.stat-label{font-size:11px;color:var(--c-muted);margin-bottom:3px;}
.stat-value{font-size:22px;font-weight:600;}
.stat-sub{font-size:10px;color:var(--c-muted);margin-top:1px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-title{font-size:13px;font-weight:600;color:var(--c-text2);}

.customer-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.table-head{display:grid;grid-template-columns:32px 1.4fr 1.4fr 0.8fr 0.9fr 1.2fr 1fr 0.8fr;padding:0 12px;height:34px;align-items:center;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.5px;gap:6px;}
.table-row{display:grid;grid-template-columns:32px 1.4fr 1.4fr 0.8fr 0.9fr 1.2fr 1fr 0.8fr;padding:0 12px;min-height:44px;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;font-size:13px;gap:6px;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:var(--bg);}
.table-row.selected{background:var(--green-l);}
.cust-name-cell{display:flex;align-items:center;gap:8px;min-width:0;}
.cust-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.cust-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cust-org{color:var(--c-text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
.region-badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:8px;background:var(--bg);color:var(--c-muted);white-space:nowrap;}
.date-text{font-size:12px;color:var(--c-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.memo-count{font-size:11px;padding:2px 7px;border-radius:8px;background:var(--bg);color:var(--c-muted);white-space:nowrap;}
.cust-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px;cursor:pointer;transition:background 0.12s;}
.cust-card:hover{background:var(--bg);}
.cust-card.selected{background:var(--green-l);border-color:var(--green-m);}
.empty-state{text-align:center;padding:40px 20px;color:var(--c-muted);font-size:13px;}

.btn{padding:8px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--c-text);display:inline-flex;align-items:center;gap:6px;transition:background 0.15s;font-family:inherit;font-weight:500;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green);}
.btn-primary:hover{background:var(--green-d);border-color:var(--green-d);}
.btn-danger{color:var(--danger);border-color:var(--danger);background:var(--surface);}
.btn-danger:hover{background:var(--danger-l);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}

.form-row{margin-bottom:14px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--c-text2);margin-bottom:5px;display:block;}
.req{color:var(--danger);}
input[type=text],input[type=date],select,textarea{width:100%;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--c-text);padding:10px 12px;font-family:inherit;}
input[type=text]:focus,input[type=date]:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,0.12);}
textarea{resize:vertical;min-height:80px;line-height:1.5;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
.modal{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:24px 20px 32px;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--c-muted);margin-bottom:20px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;border-top:1px solid var(--border);padding-top:16px;}

#cameraWrap{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:16px;padding:20px;}
#cameraVideo{width:100%;max-width:480px;border-radius:14px;border:2px solid var(--green);background:#000;}
.cam-btn{padding:12px 24px;border-radius:var(--radius);font-size:14px;cursor:pointer;border:none;font-family:inherit;font-weight:600;}
.cam-shoot{background:var(--green);color:#fff;}
.cam-cancel{background:rgba(255,255,255,0.15);color:#fff;}

#detailPanel{width:100%;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;max-height:55vh;}
.detail-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
.detail-avatar-lg{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;margin-bottom:8px;}
.detail-name{font-size:16px;font-weight:600;}
.detail-org{font-size:13px;color:var(--c-text2);margin-top:1px;}
.detail-body{padding:12px 16px;border-bottom:1px solid var(--border);}
.detail-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px;}
.detail-meta-label{color:var(--c-muted);width:46px;flex-shrink:0;}
.memo-section{padding:12px 16px;flex:1;}
.memo-section-title{font-size:11px;font-weight:600;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.memo-item{padding:10px 12px;border-radius:var(--radius);background:var(--bg);margin-bottom:8px;font-size:13px;}
.memo-date{font-size:10px;color:var(--c-muted);margin-top:5px;}

.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;transition:background 0.15s;}
.project-card:hover{background:var(--bg);}

/* Notice */
.notice-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:background 0.12s;}
.notice-item:hover{background:var(--bg);}
.notice-tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--green-l);color:var(--green-d);white-space:nowrap;flex-shrink:0;}

/* Card gallery */
.card-gallery-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.card-gallery-item:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.1);}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

@media(min-width:769px){
  .menu-btn{display:none!important;}
  .sidebar-close{display:none!important;}
  #appScreen{flex-direction:row;}
  .sidebar{position:static;transform:none!important;}
  .modal-overlay{align-items:center;padding:16px;}
  .modal{border-radius:var(--radius-lg);max-width:500px;}
  #detailPanel{width:320px;min-width:320px;max-height:none;border-top:none;border-left:1px solid var(--border);}
  .content{padding:20px 24px;}
  .topbar{padding:0 24px;height:54px;}
  .topbar-title{font-size:15px;}
  .search-bar input{width:180px;}
  .stats-row{gap:12px;margin-bottom:20px;}
  .stat-value{font-size:24px;}
}
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,0.15);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-close{display:block!important;}
  .menu-btn{display:flex!important;}
  #appScreen{flex-direction:column;}
  .main{height:100%;overflow:hidden;}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
  .stat-value{font-size:20px;}
  .form-row-2{grid-template-columns:1fr;}
  .search-bar{display:none;}
  .topbar-meta{display:none;}
  .content{padding:12px;}
}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-dot"></div><div class="auth-logo-text">ExhibitCRM</div></div>
    <div id="loginBox">
      <div class="auth-title">로그인</div>
      <div class="auth-sub">팀 계정으로 로그인하세요.</div>
      <div class="form-row"><label class="form-label">이메일</label><input type="text" id="authEmail" placeholder="hong@company.com" autocomplete="email"></div>
      <div class="form-row"><label class="form-label">비밀번호</label><input type="text" id="authPw" placeholder="비밀번호" style="-webkit-text-security:disc;" autocomplete="current-password"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:15px;" onclick="doLogin()">로그인</button>
      <div class="auth-switch">계정이 없으신가요? <a onclick="showRegister()">회원가입</a></div>
    </div>
    <div id="registerBox" style="display:none;">
      <div class="auth-title">회원가입</div>
      <div class="auth-sub">영업사원 계정을 생성하세요.</div>
      <div class="form-row"><label class="form-label">이름 <span class="req">*</span></label><input type="text" id="regName" placeholder="홍길동" autocomplete="name"></div>
      <div class="form-row"><label class="form-label">이메일 <span class="req">*</span></label><input type="text" id="regEmail" placeholder="hong@company.com" autocomplete="email"></div>
      <div class="form-row"><label class="form-label">비밀번호 <span class="req">*</span></label><input type="text" id="regPw" placeholder="6자 이상" style="-webkit-text-security:disc;" autocomplete="new-password"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:15px;" onclick="doRegister()">가입하기</button>
      <div class="auth-switch">이미 계정이 있으신가요? <a onclick="showLogin()">로그인</a></div>
    </div>
  </div>
</div>

<div id="appScreen" style="display:none;">
  <div id="sidebarOverlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo"><div class="logo-dot"></div>ExhibitCRM</div>
      <span class="sidebar-close" onclick="closeSidebar()">✕</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">메뉴</div>
      <div class="nav-item" id="nav6" onclick="setView('dashboard')"><span style="font-size:14px;">📊</span>대시보드</div>
      <div class="nav-item active" id="nav0" onclick="goAllCustomers()"><span style="font-size:14px;">👥</span>고객 목록</div>
      <div class="nav-item" id="nav1" onclick="setView('projects')"><span style="font-size:14px;">📋</span>전시회 관리</div>
      <div class="nav-item" id="nav2" style="display:none;" onclick="setView('cards')"><span style="font-size:14px;">📇</span>명함 갤러리</div>
      <div class="nav-item" id="nav3" onclick="setView('price')"><span style="font-size:14px;">💰</span>가격표</div>
      <div class="nav-item" id="nav4" onclick="setView('notices')"><span style="font-size:14px;">📢</span>공지사항</div>
      <div class="nav-item" id="nav5" style="display:none;" onclick="setView('members')"><span style="font-size:14px;">⚙️</span>회원 관리</div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="sidebar-label">전시회</div>
      <div class="project-list" id="projectList"><div style="font-size:12px;color:#999;padding:6px 8px;">불러오는 중...</div></div>
    </div>
    <div class="sidebar-bottom">
      <div class="user-chip" onclick="openMyPage()" style="cursor:pointer;">
        <div class="s-avatar" id="userAvatar">??</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="userDisplayName">—</div>
          <div id="adminBadge" style="display:none;font-size:10px;font-weight:600;color:#0F6E56;background:#E1F5EE;padding:1px 8px;border-radius:8px;margin-top:2px;width:fit-content;">관리자</div>
          <div style="display:flex;gap:6px;margin-top:3px;">
            <span style="font-size:11px;color:#1D9E75;cursor:pointer;" onclick="event.stopPropagation();openMyPage()">내 정보</span>
            <span style="font-size:11px;color:#999;">|</span>
            <span class="logout-btn" onclick="event.stopPropagation();doLogout()">로그아웃</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect y="3" width="20" height="2" rx="1" fill="currentColor"/>
            <rect y="9" width="20" height="2" rx="1" fill="currentColor"/>
            <rect y="15" width="20" height="2" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <div>
          <div class="topbar-title" id="topbarTitle">전시회를 선택하세요</div>
          <div class="topbar-meta" id="topbarMeta"></div>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="search-bar">
          <span style="font-size:12px;color:#bbb;">🔍</span>
          <input type="text" id="searchInput" placeholder="검색..." oninput="renderTable()">
        </div>
        <button class="btn" id="exportBtn" style="padding:8px 12px;font-size:13px;display:none;" onclick="exportExcel()">📥 엑셀</button>
        <button class="btn btn-primary" style="padding:8px 12px;font-size:13px;" onclick="openAddCustomer()">+ 고객</button>
      </div>
    </div>
    <div class="content">
      <div id="viewCustomers">
        <div class="stats-row" id="statsRow"></div>
        <div class="section-header">
          <div class="section-title" id="sectionTitle">고객 목록</div>
        </div>
        <div id="filterBar" style="display:none;margin-bottom:12px;"></div>
        <div class="customer-table" id="customerTable"><div class="empty-state">전시회를 선택하면 고객 목록이 표시됩니다.</div></div>
      </div>
      <div id="viewProjects" style="display:none;"></div>
      <div id="viewCards"    style="display:none;"></div>
      <div id="viewPrice"    style="display:none;"></div>
      <div id="viewNotices"  style="display:none;"></div>
      <div id="viewMembers"    style="display:none;"></div>
      <div id="viewDashboard" style="display:none;"></div>
    </div>
  </div>
  <div id="detailPanel" style="display:none;"></div>
</div>

<div id="cameraWrap">
  <div style="position:relative;width:100%;max-width:480px;">
    <video id="cameraVideo" autoplay playsinline muted style="width:100%;border-radius:14px;border:2px solid var(--green);background:#000;display:block;"></video>
    <!-- QR 스캔 가이드 오버레이 -->
    <div id="camQrGuide" style="display:none;position:absolute;inset:0;pointer-events:none;">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:3px solid #1D9E75;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);"></div>
      <div style="position:absolute;bottom:16px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.8);font-size:13px;">QR코드 / 바코드를 네모 안에 맞추세요</div>
    </div>
    <div id="camPhotoGuide" style="position:absolute;bottom:10px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.6);font-size:13px;pointer-events:none;">명함에 카메라를 맞추세요</div>
  </div>
  <canvas id="cameraCanvas" style="display:none;"></canvas>
  <div id="camQrResult" style="display:none;background:rgba(29,158,117,0.9);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;max-width:400px;text-align:center;"></div>
  <div style="display:flex;gap:12px;">
    <button id="camShootBtn" class="cam-btn cam-shoot" onclick="capturePhoto()">📸 촬영</button>
    <button class="cam-btn cam-cancel" onclick="closeCamera()">취소</button>
  </div>
</div>
<input type="file" id="galleryInput" accept="image/*" style="display:none;" onchange="onGallerySelected(this)">

<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div id="toast"></div>
</body>
</html>
